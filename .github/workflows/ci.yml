name: CI

# Project Timeline:
#   Duration: 6 months (2026-04-27 to 2026-10-27)
#   Session: 5h max, Linux Cron (Mon-Sat)
#   Phase: M1-2=Infrastructure+Features, M3-4=Quality+Tests, M5=Integration+BugFix, M6=Release

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Security audit
        run: pip install safety && safety check -r requirements.txt || true

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Vite build output
        uses: actions/cache@v4
        with:
          path: frontend/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: vite-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --if-present

      - name: Lint
        run: npm run lint --if-present -- --max-warnings 0

      - name: Test
        run: npm test --if-present -- --run

      - name: Build
        run: npm run build

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: itil
          POSTGRES_PASSWORD: itil_secret
          POSTGRES_DB: itil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run DB migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://itil:itil_secret@localhost:5432/itil_test
        run: python -m alembic upgrade head

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://itil:itil_secret@localhost:5432/itil_test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: uvicorn app.main:app --host 127.0.0.1 --port 8000 &

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api/v1
        run: npx playwright test --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t itil-backend:ci ./backend
