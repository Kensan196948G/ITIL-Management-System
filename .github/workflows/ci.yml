name: CI

# Project Timeline:
#   Duration: 6 months (2026-04-27 to 2026-10-27)
#   Session: 5h max, Linux Cron (Mon-Sat)
#   Phase: M1-2=Infrastructure+Features, M3-4=Quality+Tests, M5=Integration+BugFix, M6=Release

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Security audit
        run: pip install safety && safety check -r requirements.txt || true

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Vite build output
        uses: actions/cache@v4
        with:
          path: frontend/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: vite-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --if-present

      - name: Lint
        run: npm run lint --if-present -- --max-warnings 0

      - name: Test
        run: npm test --if-present -- --run

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t itil-backend:ci ./backend
